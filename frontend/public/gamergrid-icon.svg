<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)" opacity="0.2"/>
  
  <!-- Grid pattern -->
  <g stroke="url(#grad1)" stroke-width="8" fill="none">
    <line x1="170" y1="150" x2="170" y2="362"/>
    <line x1="256" y1="150" x2="256" y2="362"/>
    <line x1="342" y1="150" x2="342" y2="362"/>
    <line x1="150" y1="200" x2="362" y2="200"/>
    <line x1="150" y1="256" x2="362" y2="256"/>
    <line x1="150" y1="312" x2="362" y2="312"/>
  </g>
  
  <!-- Gamepad shape overlay -->
  <g fill="url(#grad1)">
    <!-- D-pad -->
    <rect x="180" y="240" width="30" height="80" rx="5"/>
    <rect x="165" y="255" width="60" height="50" rx="5"/>
    
    <!-- Buttons -->
    <circle cx="320" cy="270" r="15"/>
    <circle cx="350" cy="240" r="15"/>
    <circle cx="350" cy="300" r="15"/>
    <circle cx="380" cy="270" r="15"/>
  </g>
  
  <!-- "GG" text -->
  <text x="256" y="430" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="url(#grad1)" text-anchor="middle">GG</text>
</svg>
