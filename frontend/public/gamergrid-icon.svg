<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4500;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Glow effect -->
  <circle cx="256" cy="256" r="220" fill="url(#glow)" opacity="0.5"/>
  
  <!-- PlayStation Controller Body -->
  <g fill="url(#neonGrad)" stroke="#000" stroke-width="6">
    <!-- Left grip -->
    <path d="M 120 200 Q 100 220 100 260 L 100 320 Q 100 360 130 380 L 160 400 L 180 320 L 160 200 Z"/>
    
    <!-- Right grip -->
    <path d="M 392 200 Q 412 220 412 260 L 412 320 Q 412 360 382 380 L 352 400 L 332 320 L 352 200 Z"/>
    
    <!-- Center body -->
    <rect x="160" y="180" width="192" height="140" rx="20" ry="20"/>
    
    <!-- Top triggers -->
    <rect x="140" y="160" width="60" height="30" rx="10" opacity="0.8"/>
    <rect x="312" y="160" width="60" height="30" rx="10" opacity="0.8"/>
  </g>
  
  <!-- D-Pad (Left) -->
  <g fill="#000" stroke="#FFD700" stroke-width="3">
    <rect x="195" y="230" width="15" height="50" rx="3"/>
    <rect x="180" y="245" width="45" height="20" rx="3"/>
  </g>
  
  <!-- Action Buttons (Right) - PlayStation symbols -->
  <g fill="#000" stroke="#FFD700" stroke-width="3">
    <!-- Triangle -->
    <polygon points="330,225 320,245 340,245" fill="#0F0"/>
    
    <!-- Circle -->
    <circle cx="350" cy="250" r="12" fill="#F00"/>
    
    <!-- Cross/X -->
    <g stroke="#00F" stroke-width="4" fill="none">
      <line x1="305" y1="245" x2="320" y2="260"/>
      <line x1="320" y1="245" x2="305" y2="260"/>
    </g>
    
    <!-- Square -->
    <rect x="325" y="265" width="18" height="18" fill="#F0F"/>
  </g>
  
  <!-- Center touchpad -->
  <rect x="220" y="240" width="72" height="35" rx="5" fill="#222" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
  
  <!-- "GG" Text with glow -->
  <text x="256" y="460" font-family="Arial Black, sans-serif" font-size="90" font-weight="900" fill="url(#neonGrad)" stroke="#000" stroke-width="3" text-anchor="middle">GG</text>
</svg>
