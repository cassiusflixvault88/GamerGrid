<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <!-- Purple Gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Vault Icon -->
  <g transform="translate(50, 100)">
    <circle cx="0" cy="0" r="50" fill="url(#goldGrad)" opacity="0.2"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
    <circle cx="0" cy="0" r="35" fill="url(#goldGrad)"/>
    <circle cx="0" cy="0" r="28" fill="#000"/>
    <circle cx="0" cy="0" r="10" fill="url(#goldGrad)"/>
  </g>
  
  <!-- FlixVault Text (Purple) -->
  <text x="130" y="130" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="url(#purpleGrad)" letter-spacing="-2">FlixVault</text>
</svg>
