<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Vault Icon (Small) -->
  <g transform="translate(30, 100)">
    <circle cx="0" cy="0" r="50" fill="url(#textGradient)" opacity="0.2"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="url(#textGradient)" stroke-width="3"/>
    <circle cx="0" cy="0" r="35" fill="url(#textGradient)"/>
    <circle cx="0" cy="0" r="28" fill="#000"/>
    <circle cx="0" cy="0" r="10" fill="url(#textGradient)"/>
  </g>
  
  <!-- FlixVault Text -->
  <text x="120" y="135" font-family="Arial, sans-serif" font-size="90" font-weight="900" fill="url(#textGradient)" letter-spacing="-2">FlixVault</text>
  
  <!-- Tagline -->
  <text x="120" y="165" font-family="Arial, sans-serif" font-size="20" font-weight="400" fill="#FFD700" opacity="0.7">YOUR PREMIUM MOVIE VAULT</text>
</svg>
