<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0014"/>
      <stop offset="50%" stop-color="#1a0033"/>
      <stop offset="100%" stop-color="#000814"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="350" fill="url(#glow)"/>
  <circle cx="1050" cy="500" r="300" fill="url(#glow)" opacity="0.6"/>

  <!-- Grid pattern overlay -->
  <g stroke="#a855f7" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>

  <!-- Game controller icon -->
  <g transform="translate(80, 130)" filter="url(#shadow)">
    <rect x="0" y="0" width="120" height="120" rx="32" fill="url(#brand)"/>
    <g transform="translate(20, 28) scale(0.7)" fill="#0b0014">
      <path d="M30 50 Q 30 30 50 30 L 80 30 Q 100 30 100 50 L 100 60 Q 100 80 80 80 L 50 80 Q 30 80 30 60 Z"/>
      <circle cx="50" cy="55" r="6" fill="#a855f7"/>
      <circle cx="80" cy="55" r="6" fill="#ec4899"/>
      <circle cx="65" cy="48" r="3" fill="#fbbf24"/>
      <circle cx="65" cy="62" r="3" fill="#10b981"/>
    </g>
  </g>

  <!-- Brand name -->
  <text x="230" y="195" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="96" font-weight="900" fill="url(#brand)" filter="url(#shadow)">GamerGrid</text>

  <!-- Tagline -->
  <text x="230" y="248" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="600" fill="#e5e7eb">Discover · Track · Watch · Tip</text>

  <!-- Big headline -->
  <text x="80" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#ffffff">5,000+ Games · HD Trailers</text>
  <text x="80" y="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#ffffff">Every New Release. One Hub.</text>

  <!-- Platform pills -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#0b0014">
    <g transform="translate(80, 480)">
      <rect width="120" height="48" rx="24" fill="#a855f7"/>
      <text x="60" y="32" text-anchor="middle">PS5</text>
    </g>
    <g transform="translate(216, 480)">
      <rect width="120" height="48" rx="24" fill="#10b981"/>
      <text x="60" y="32" text-anchor="middle">XBOX</text>
    </g>
    <g transform="translate(352, 480)">
      <rect width="120" height="48" rx="24" fill="#3b82f6"/>
      <text x="60" y="32" text-anchor="middle">PC</text>
    </g>
    <g transform="translate(488, 480)">
      <rect width="120" height="48" rx="24" fill="#ef4444"/>
      <text x="60" y="32" text-anchor="middle">SWITCH</text>
    </g>
  </g>

  <!-- URL -->
  <text x="80" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#a855f7">gamer-grid.com</text>
  <text x="1120" y="585" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#9ca3af">by Cassius Fox</text>
</svg>
